<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Player de Filme</title>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      aspect-ratio: 16/9;
    }
  </style>
</head>

<body>

  <iframe id="player" allowfullscreen></iframe>

  <script>
    // pega o id da URL
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (id) {
      document.getElementById("player").src =
        "https://myembed.biz/filme/" + id;
    } else {
      document.body.innerHTML = "<h2 style='color:white'>ID não encontrado</h2>";
    }
  </script>

</body>
</html>
